

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Animated Login Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Poppins', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            overflow:hidden;
        }

        /* Floating circles */
        body::before,
        body::after{
            content:'';
            position:absolute;
            border-radius:50%;
            background:rgba(255,255,255,0.15);
            animation: float 6s infinite ease-in-out;
        }

        body::before{
            width:250px;
            height:250px;
            top:-80px;
            left:-80px;
        }

        body::after{
            width:300px;
            height:300px;
            bottom:-100px;
            right:-100px;
            animation-delay:2s;
        }

        @keyframes float{
            0%,100%{
                transform:translateY(0px);
            }
            50%{
                transform:translateY(20px);
            }
        }

        .container{
            position:relative;
            width:380px;
            padding:40px;
            border-radius:25px;
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.15);
            border:1px solid rgba(255,255,255,0.2);
            box-shadow:0 8px 32px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .container h2{
            color:#fff;
            text-align:center;
            margin-bottom:30px;
            font-size:32px;
            letter-spacing:1px;
        }

        .input-box{
            position:relative;
            margin-bottom:25px;
        }

        .input-box input{
            width:100%;
            padding:14px 15px;
            border:none;
            outline:none;
            border-radius:12px;
            background:rgba(255,255,255,0.2);
            color:#fff;
            font-size:16px;
            transition:0.3s;
        }

        .input-box input::placeholder{
            color:#eee;
        }

        .input-box input:focus{
            background:rgba(255,255,255,0.3);
            transform:scale(1.02);
        }

        .login-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#fff;
            color:#2575fc;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 20px rgba(0,0,0,0.2);
        }

        .register{
            text-align:center;
            margin-top:20px;
            color:#fff;
        }

        .register a{
            color:#fff;
            text-decoration:none;
            font-weight:bold;
            padding:10px 20px;
            border:1px solid rgba(255,255,255,0.4);
            border-radius:10px;
            display:inline-block;
            margin-top:10px;
            transition:0.3s;
        }

        .register a:hover{
            background:#fff;
            color:#2575fc;
            transform:scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Login</h2>

        <div class="input-box">
            <input type="text" placeholder="Enter Your Name">
        </div>

        <div class="input-box">
            <input type="email" placeholder="Enter Email Address">
        </div>

        <button class="login-btn">Login</button>

        <div class="register">
            <p>Don't have an account?</p>
            <a href="#">Register</a>
        </div>
    </div>

</body>
</html>
